services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    networks:
      - platform-net
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ""
      # Improve file watching reliability on Windows/host-mounted volumes
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 4173"
    ports:
      - "4173:4173"
    depends_on:
      - backend

  backend:
    image: maven:3.9.9-eclipse-temurin-17
    entrypoint: ["sh","-lc"]
    working_dir: /workspace
    networks:
      - platform-net
    volumes:
      - ./:/workspace
      - maven-cache:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:oracle:thin:@//oracle:1521/FREEPDB1
      DATABASE_USERNAME: ${DATABASE_USERNAME:-app}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-app}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-change-me-in-prod-change-me-in-prod}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-1209600}
      JAVA_OPTS: "-Doracle.jdbc.timezoneAsRegion=false"
    # IMPORTANT: Maven does NOT automatically recompile on file changes.
    # In dev we run a tiny polling watcher (no extra packages) over bind-mounted src/ (Windows-friendly)
    # and trigger `mvn compile`. Spring Boot DevTools restarts on classpath changes (target/classes).
    command:
      - >
        set -e;
        mvn -q -DskipTests compile;
        (
          last="";
          while true; do
            cur="$$(find src pom.xml -type f -print0 2>/dev/null | xargs -0 -I{} stat -c '%Y:%s:{}' {} 2>/dev/null | sort | sha256sum | awk '{print $$1}')";
            if [ "$$cur" != "$$last" ]; then
              last="$$cur";
              mvn -q -DskipTests compile || true;
            fi;
            sleep 1;
          done
        ) &
        exec mvn -q -DskipTests spring-boot:run -Dspring-boot.run.profiles=dev
    ports:
      - "8080:8080"
    depends_on:
      oracle:
        condition: service_healthy

  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: platform-oracle
    environment:
      ORACLE_PASSWORD: ${DATABASE_PASSWORD:-app}
      APP_USER: ${DATABASE_USERNAME:-app}
      APP_USER_PASSWORD: ${DATABASE_PASSWORD:-app}
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - platform-net

  nginx:
    image: nginx:1.27-alpine
    container_name: platform-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - platform-net

networks:
  platform-net:
    external: false

volumes:
  maven-cache:
  oracle-data:

