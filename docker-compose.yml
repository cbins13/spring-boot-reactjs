services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: platform-oracle
    environment:
      ORACLE_PASSWORD: ${DATABASE_PASSWORD:-app}
      APP_USER: ${DATABASE_USERNAME:-app}
      APP_USER_PASSWORD: ${DATABASE_PASSWORD:-app}
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - platform-net

  backend:
    image: platform-backend:prod
    container_name: platform-backend
    environment:
      DATABASE_URL: jdbc:oracle:thin:@//oracle:1521/FREEPDB1
      DATABASE_USERNAME: ${DATABASE_USERNAME:-app}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-app}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-change-me-in-prod-change-me-in-prod}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-1209600}
      DEBUG_LOG_PATH: /debug/debug.log
      DEBUG_RUN_ID: ora18716-trace1
      JAVA_OPTS: "-Doracle.jdbc.timezoneAsRegion=false"
    volumes:
      - ./.cursor:/debug
    depends_on:
      oracle:
        condition: service_healthy
    networks:
      - platform-net

  frontend:
    image: platform-frontend:prod
    container_name: platform-frontend
    expose:
      - "4173"
    depends_on:
      - backend
    networks:
      - platform-net

  nginx:
    image: nginx:1.27-alpine
    container_name: platform-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - platform-net

networks:
  platform-net:
    driver: bridge

volumes:
  oracle-data:

