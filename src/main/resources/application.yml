server:
  port: 8080

spring:
  application:
    name: platform
  datasource:
    url: ${DATABASE_URL:jdbc:oracle:thin:@//localhost:1521/FREEPDB1}
    username: ${DATABASE_USERNAME:app}
    password: ${DATABASE_PASSWORD:app}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_instant_jdbc_type: TIMESTAMP
        jdbc:
          time_zone: UTC
      oracle:
        jdbc:
          timezoneAsRegion: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

logging:
  # File configuration
  file:
    path: ${LOG_PATH:logs}
    name: ${LOG_FILE:application}
  
  # Log levels - focused on errors and warnings only
  level:
    root: WARN
    com.example.platform: WARN
    org.springframework: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: ERROR
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR
    org.flywaydb: WARN
    com.zaxxer.hikari: ERROR
    oracle.jdbc: ERROR
    
  # Pattern configuration (fallback if logback-spring.xml is not used)
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me-in-prod}
    access-expiration-seconds: ${JWT_ACCESS_EXPIRATION:900}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:1209600}

