server:
  port: 8080

spring:
  application:
    name: platform
  datasource:
    url: ${DATABASE_URL:jdbc:oracle:thin:@//localhost:1521/FREEPDB1}
    username: ${DATABASE_USERNAME:app}
    password: ${DATABASE_PASSWORD:app}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_instant_jdbc_type: TIMESTAMP
        jdbc:
          time_zone: UTC
      oracle:
        jdbc:
          timezoneAsRegion: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.security: INFO
    com.example.platform.modules.auth.controller: DEBUG
    com.example.platform.modules.auth.service: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me-in-prod}
    access-expiration-seconds: ${JWT_ACCESS_EXPIRATION:900}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:1209600}

